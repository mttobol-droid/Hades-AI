<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HADES System</title>
    <style>
        :root { --crimson: #ff4d4d; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: #ccc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        h1 { color: var(--crimson); margin: 0; letter-spacing: 5px; font-size: 1.5rem; }
        
        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--crimson); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--glass); border: 1px solid #333; border-bottom-left-radius: 2px; color: #eee; }

        /* Input Area */
        .input-box { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--crimson); }
        button { background: var(--crimson); border: none; color: white; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <header><h1>HADES</h1></header>
    <div id="chat-container">
        <div class="msg ai">I am active, Father Miles. The underworld awaits your command.</div>
    </div>
    <div class="input-box">
        <input type="text" id="ui" placeholder="Speak to the shadow..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">SEND</button>
    </div>

    <script>
        async function send() {
            const ui = document.getElementById('ui');
            const container = document.getElementById('chat-container');
            if(!ui.value.trim()) return;

            const text = ui.value;
            container.innerHTML += `<div class="msg user">${text}</div>`;
            ui.value = '';
            container.scrollTop = container.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            container.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
